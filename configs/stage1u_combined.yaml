# Stage U combined-data pretrain: 80M model on 3-way data
# (LeRobot + V-self-play + T-self-play). Capacity-data-matched so 3-way
# expansion that broke V' should now help instead of hurt.

model:
  encoder:
    img_size: 96
    patch_size: 8
    in_chans: 3
    embed_dim: 512
    depth: 12
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
  predictor:
    n_layers: 12
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
    max_context: 16
  action:
    d_a: 2
    chunk_size: 8
  idm_z:
    hidden: 512
    depth: 3

trainer:
  lambda_pred: 1.0
  lambda_reward: 0.0
  lambda_idm_z: 30.0
  lambda_reg: 1.0
  total_steps: 14000

data:
  lerobot:
    repo_id: lerobot/pusht_image
    image_key: observation.image
    action_key: action
    reward_key: next.reward
    context_len: 4
    chunk_size: 8
    normalize_actions: true
  synthetic:
    rollout_dirs:
      - /workspace/cser-jepa-v2/rollouts/self_play
      - /workspace/cser-jepa-v2/rollouts/self_play_t
    context_len: 4
    chunk_size: 8
    normalize_actions: true

optimizer:
  lr: 2.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.05
  clip_grad: 1.0
  amp: true
  warmup_steps: 1000
  min_lr_ratio: 0.1

batch:
  size: 48
