# Stage 1 (B): reward fine-tune.
# Resume from Stage 1 (A) checkpoint, turn on λ_reward, train shorter.
# Architecture identical to stage1_pusht_scale.

model:
  encoder:
    img_size: 96
    patch_size: 8
    in_chans: 3
    embed_dim: 384
    depth: 8
    num_heads: 6
    mlp_ratio: 4.0
    dropout: 0.0
  predictor:
    n_layers: 8
    num_heads: 6
    mlp_ratio: 4.0
    dropout: 0.0
    max_context: 16
  action:
    d_a: 2
    chunk_size: 8
  idm_z:
    hidden: 384
    depth: 3

trainer:
  lambda_pred: 1.0          # keep pred objective alive so the world model
                            # doesn't drift while reward is added
  lambda_reward: 1.0        # NEW: train reward head against r_chunk.sum
  lambda_idm_z: 20.0
  lambda_reg: 1.0
  total_steps: 3000

data:
  repo_id: lerobot/pusht_image
  image_key: observation.image
  action_key: action
  reward_key: next.reward
  context_len: 4
  chunk_size: 8

optimizer:
  lr: 1.0e-4               # lower LR for fine-tune
  betas: [0.9, 0.95]
  weight_decay: 0.05
  clip_grad: 1.0
  amp: true
  warmup_steps: 200
  min_lr_ratio: 0.1

batch:
  size: 64
