# CSER-JEPA-v3 Stage 0 toy gate.
# Bitter-lesson-pure architecture: ViT encoder + transformer predictor.
# No spectral path, no residual decomposition, no inverse model.
# Reward head exists but unused (toy has no reward signal).

model:
  encoder:
    img_size: 32
    patch_size: 4
    in_chans: 3
    embed_dim: 128
    depth: 4
    num_heads: 4
    mlp_ratio: 4.0
    dropout: 0.0
  predictor:
    n_layers: 4
    num_heads: 4
    mlp_ratio: 4.0
    dropout: 0.0
    max_context: 16
  action:
    d_a: 2
    chunk_size: 1
  idm_z:
    hidden: 128
    depth: 3

trainer:
  lambda_pred: 1.0
  lambda_reward: 0.0
  lambda_idm_z: 5.0
  lambda_reg: 1.0
  total_steps: 4000

data:
  image_size: 32
  in_chans: 3
  state_dim: 2
  action_dim: 2
  context_len: 4
  chunk_size: 1
  blob_sigma: 4.0     # large-blob regime: encoder mean-pool retains
                      # position info (the v2-D lesson). On real video
                      # this is unnecessary; toy-specific.
  action_scale: 0.25
  alpha: 1.0
  rho: 0.0
  noise_std: 0.0

optimizer:
  lr: 5.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.01
  clip_grad: 1.0

batch:
  size: 32
