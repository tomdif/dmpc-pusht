# Stage AG: object-aware pixel masking (light C-JEPA).
# Resume from Z reward ckpt; train with object_mask_prob=0.5 — half the
# synthetic-data batches have one randomly-chosen object zeroed in
# x_context. Encoder must learn to predict masked object's future from
# context. Per-step reward + value head retained from Z.

model:
  encoder:
    img_size: 96
    patch_size: 8
    in_chans: 3
    embed_dim: 768
    depth: 12
    num_heads: 12
    mlp_ratio: 4.0
    dropout: 0.0
  predictor:
    n_layers: 12
    num_heads: 12
    mlp_ratio: 4.0
    dropout: 0.0
    max_context: 16
  action:
    d_a: 2
    chunk_size: 8
  idm_z:
    hidden: 768
    depth: 3

trainer:
  lambda_pred: 1.0
  lambda_reward: 1.0
  lambda_value: 1.0
  lambda_state: 0.0       # state decoder OFF — AF showed it shifts encoder badly
  lambda_idm_z: 40.0
  lambda_reg: 1.0
  total_steps: 5000

data:
  lerobot:
    repo_id: lerobot/pusht_image
    image_key: observation.image
    action_key: action
    reward_key: next.reward
    context_len: 4
    chunk_size: 8
    normalize_actions: true
  synthetic:
    rollout_dirs:
      - /workspace/cser-jepa-v2/rollouts/self_play_af   # has state labels
    context_len: 4
    chunk_size: 8
    normalize_actions: true
    return_to_go: true
    discount: 0.99
    object_mask_prob: 0.5
    env_coord_scale: 0.1875

optimizer:
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.05
  clip_grad: 1.0
  amp: true
  warmup_steps: 400
  min_lr_ratio: 0.1

batch:
  size: 32
