# Stage 1 pretrain on lerobot/pusht_image.
# 96x96x3 RGB, 2D continuous actions, 206 episodes / 25,650 frames.
# Model is overridden per-dataset for img_size and action.d_a in the driver.

model:
  encoder:
    img_size: 96      # overridden by driver from data
    patch_size: 8     # 96/8 = 12; 144 patches
    in_chans: 3
    embed_dim: 256
    depth: 6
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
  predictor:
    n_layers: 6
    num_heads: 8
    mlp_ratio: 4.0
    dropout: 0.0
    max_context: 16
  action:
    d_a: 2            # overridden by driver from data
    chunk_size: 8     # predict ~0.8s ahead at 10fps; one-step is too easy
  idm_z:
    hidden: 256
    depth: 3

trainer:
  lambda_pred: 1.0
  lambda_reward: 0.0      # will switch on for Stage 2
  lambda_idm_z: 5.0
  lambda_reg: 1.0
  total_steps: 2000       # smoke test; scale up after green

data:
  repo_id: lerobot/pusht_image
  image_key: observation.image
  action_key: action
  reward_key: next.reward
  context_len: 4
  chunk_size: 8

optimizer:
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.05
  clip_grad: 1.0
  amp: true

batch:
  size: 64
