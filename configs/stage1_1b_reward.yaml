# 1B reward+value fine-tune from 1B pretrain ckpt.

model:
  encoder:
    img_size: 96
    patch_size: 8
    in_chans: 3
    embed_dim: 1280
    depth: 24
    num_heads: 16
    mlp_ratio: 4.0
    dropout: 0.0
  predictor:
    n_layers: 24
    num_heads: 16
    mlp_ratio: 4.0
    dropout: 0.0
    max_context: 16
  action:
    d_a: 2
    chunk_size: 8
  idm_z:
    hidden: 1280
    depth: 3

trainer:
  lambda_pred: 1.0
  lambda_reward: 1.0
  lambda_value: 1.0
  lambda_idm_z: 250.0
  lambda_reg: 1.0
  total_steps: 4000

data:
  lerobot:
    repo_id: lerobot/pusht_image
    image_key: observation.image
    action_key: action
    reward_key: next.reward
    context_len: 4
    chunk_size: 8
    normalize_actions: true
  synthetic:
    rollout_dirs:
      - /workspace/cser-jepa-v2/rollouts/self_play
      - /workspace/cser-jepa-v2/rollouts/self_play_t
      - /workspace/cser-jepa-v2/rollouts/self_play_u
      - /workspace/cser-jepa-v2/rollouts/self_play_z
      - /workspace/cser-jepa-v2/rollouts/self_play_af
    context_len: 4
    chunk_size: 8
    normalize_actions: true
    return_to_go: true
    discount: 0.99

optimizer:
  lr: 3.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.05
  clip_grad: 1.0
  amp: true
  warmup_steps: 300
  min_lr_ratio: 0.1

batch:
  size: 24
