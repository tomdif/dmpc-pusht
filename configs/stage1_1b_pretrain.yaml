# Stage 1B (one-billion-param) pretrain — ViT-Giant-ish (~1B).
# embed_dim=1280, depth=24, heads=16. Encoder ~470M + predictor ~470M
# + small heads = ~1.0B params total.
#
# IMPORTANT CAVEAT: 334K windows × 1B params is an aggressive
# capacity-data ratio. Expect overfit-on-training, regression on
# held-out, similar to V' at smaller scale. This run is the
# definitive empirical test of "does scale alone help on pusht?"

model:
  encoder:
    img_size: 96
    patch_size: 8
    in_chans: 3
    embed_dim: 1280
    depth: 24
    num_heads: 16
    mlp_ratio: 4.0
    dropout: 0.0
  predictor:
    n_layers: 24
    num_heads: 16
    mlp_ratio: 4.0
    dropout: 0.0
    max_context: 16
  action:
    d_a: 2
    chunk_size: 8
  idm_z:
    hidden: 1280
    depth: 3

trainer:
  lambda_pred: 1.0
  lambda_reward: 0.0
  lambda_value: 0.0
  lambda_idm_z: 250.0     # 5x bumped from 50 — first 1B run collapsed at λ=50
                          # to action-blind features (shuffle 1.0× by step 1499).
  lambda_reg: 1.0
  total_steps: 12000      # smaller step count given 1B-param compute cost

data:
  lerobot:
    repo_id: lerobot/pusht_image
    image_key: observation.image
    action_key: action
    reward_key: next.reward
    context_len: 4
    chunk_size: 8
    normalize_actions: true
  synthetic:
    rollout_dirs:
      - /workspace/cser-jepa-v2/rollouts/self_play
      - /workspace/cser-jepa-v2/rollouts/self_play_t
      - /workspace/cser-jepa-v2/rollouts/self_play_u
      - /workspace/cser-jepa-v2/rollouts/self_play_z
      - /workspace/cser-jepa-v2/rollouts/self_play_af
    context_len: 4
    chunk_size: 8
    normalize_actions: true
    return_to_go: true
    discount: 0.99

optimizer:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.05
  clip_grad: 1.0
  amp: true
  warmup_steps: 1500
  min_lr_ratio: 0.1

batch:
  size: 24                # bumped from 16 — try to fit larger batch within memory.
                          # Smaller batch was contributing to encoder collapse.
