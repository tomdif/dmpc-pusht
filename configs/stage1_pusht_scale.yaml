# Stage 1 scale-up on lerobot/pusht_image.
# ~30M params: embed_dim=384, encoder depth=8, predictor depth=8.
# 8000 steps, ~10x smoke compute. Validates that the v3 architecture
# scales without architectural changes (only width/depth/steps).

model:
  encoder:
    img_size: 96
    patch_size: 8
    in_chans: 3
    embed_dim: 384
    depth: 8
    num_heads: 6
    mlp_ratio: 4.0
    dropout: 0.0
  predictor:
    n_layers: 8
    num_heads: 6
    mlp_ratio: 4.0
    dropout: 0.0
    max_context: 16
  action:
    d_a: 2
    chunk_size: 8
  idm_z:
    hidden: 384
    depth: 3

trainer:
  lambda_pred: 1.0
  lambda_reward: 0.0
  lambda_idm_z: 20.0       # bumped from 5; bigger encoder needs stronger
                           # action-grounding pressure to avoid collapsing
                           # to an action-blind manifold (smoke run with
                           # 9.9M params worked at 5; 29M params did not).
  lambda_reg: 1.0
  total_steps: 8000

data:
  repo_id: lerobot/pusht_image
  image_key: observation.image
  action_key: action
  reward_key: next.reward
  context_len: 4
  chunk_size: 8

optimizer:
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.05
  clip_grad: 1.0
  amp: true
  warmup_steps: 500       # cosine decay after warmup
  min_lr_ratio: 0.1

batch:
  size: 64
